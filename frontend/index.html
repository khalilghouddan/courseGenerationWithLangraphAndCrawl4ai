<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepAgent Course Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX transpilation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Marked for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- Mermaid.js for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg: #07090f;
      --bg-card: rgba(14, 20, 37, 0.72);
      --bg-hover: rgba(18, 25, 45, 0.9);
      --border: rgba(255,255,255,0.06);
      --border-active: rgba(99,102,241,0.5);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --accent: #6366f1;
      --accent2: #a855f7;
      --accent3: #06b6d4;
      --grad: linear-gradient(135deg,#6366f1,#a855f7);
      --grad-text: linear-gradient(90deg,#818cf8,#c084fc);
      --green: #10b981;
      --red: #f43f5e;
      --sidebar: 360px;
      --nav: 300px;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(99,102,241,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(168,85,247,0.06) 0%, transparent 60%);
    }

    #root { height: 100vh; display: flex; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* ─── Layout ─── */
    .app { display: flex; width: 100vw; height: 100vh; }

    /* ─── Left Sidebar ─── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: rgba(8,12,24,0.9);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-top {
      padding: 22px 22px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 22px;
    }

    .logo-mark {
      width: 38px; height: 38px;
      background: var(--grad);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(99,102,241,0.45);
      flex-shrink: 0;
    }

    .logo-name {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 800;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    /* ─── Generator ─── */
    .gen-panel {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .gen-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .gen-textarea {
      width: 100%;
      height: 90px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      line-height: 1.5;
    }

    .gen-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .gen-textarea::placeholder { color: var(--text-muted); }

    .gen-btn {
      width: 100%;
      margin-top: 10px;
      padding: 11px;
      background: var(--grad);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }

    .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.5); }
    .gen-btn:active { transform: translateY(0); }
    .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ─── Course Library ─── */
    .library {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .library-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .course-card {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: all 0.22s ease;
      margin-bottom: 10px;
    }

    .course-card:hover {
      border-color: rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.05);
      transform: translateX(3px);
    }

    .course-card.active {
      border-color: var(--border-active);
      background: rgba(99,102,241,0.1);
    }

    .card-sub {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ─── Main Workspace ─── */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Empty State ─── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      text-align: center;
    }

    .empty-glow {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.15); }
      50% { box-shadow: 0 0 40px 20px rgba(99,102,241,0.1); }
    }

    .empty h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 14px;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .empty p {
      color: var(--text-dim);
      max-width: 460px;
      font-size: 15px;
      line-height: 1.65;
    }

    /* ─── Loading State ─── */
    .loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      text-align: center;
    }

    .loader-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.05);
      border-top: 4px solid var(--accent);
      animation: spin 0.9s linear infinite;
      margin-bottom: 28px;
      box-shadow: 0 0 30px rgba(99,102,241,0.3);
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .loading h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .loading p { color: var(--text-dim); font-size: 14px; max-width: 400px; }

    .steps {
      margin-top: 32px;
      background: rgba(14,20,37,0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13.5px;
      color: var(--text-muted);
      transition: color 0.4s;
    }

    .step.active { color: var(--text); font-weight: 600; }
    .step.done { color: var(--green); }

    .step-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
      transition: all 0.4s;
    }

    .step.active .step-dot { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 12px rgba(99,102,241,0.5); color: #fff; }
    .step.done .step-dot { border-color: var(--green); background: var(--green); color: #fff; }

    /* ─── Course Viewer ─── */
    .viewer {
      flex: 1;
      display: flex;
      overflow: hidden;
      height: 100%;
    }

    /* ─── Banner ─── */
    .banner {
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,24,0.6);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
      gap: 20px;
    }

    .banner-left { flex: 1; min-width: 0; }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--grad);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .banner-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .banner-headline { color: var(--text-dim); font-size: 14px; line-height: 1.5; }

    .banner-right {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .stat-chip {
      padding: 7px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .stat-chip svg { flex-shrink: 0; }

    /* ─── Lesson Nav Sidebar ─── */
    .lesson-nav {
      width: var(--nav);
      flex-shrink: 0;
      background: rgba(8,12,24,0.5);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
    }

    .chapter-group { margin-bottom: 22px; }

    .chapter-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 4px 8px;
      margin-bottom: 6px;
    }

    .lesson-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s ease;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .lesson-btn:hover { background: rgba(255,255,255,0.03); color: var(--text); }

    .lesson-btn.active {
      background: rgba(99,102,241,0.15);
      color: var(--text);
      font-weight: 500;
    }

    .lesson-num {
      min-width: 18px;
      height: 18px;
      background: rgba(99,102,241,0.2);
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      margin-top: 1px;
      flex-shrink: 0;
    }

    .lesson-btn.active .lesson-num {
      background: var(--accent);
      color: #fff;
    }

    /* ─── Content Area ─── */
    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 50px 70px;
    }

    /* ─── Markdown Styles ─── */
    .md h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .md h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin: 36px 0 14px;
      color: var(--text);
    }

    .md h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 600;
      margin: 28px 0 10px;
      color: var(--text);
    }

    .md h4 {
      font-size: 15px;
      font-weight: 600;
      margin: 20px 0 8px;
      color: var(--text-dim);
    }

    .md p { color: #b0bec5; line-height: 1.8; margin-bottom: 18px; font-size: 15px; }

    .md ul, .md ol {
      margin: 0 0 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .md li { color: #b0bec5; font-size: 15px; line-height: 1.7; }

    .md code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      background: rgba(6,182,212,0.1);
      color: var(--accent3);
      padding: 2px 7px;
      border-radius: 5px;
      border: 1px solid rgba(6,182,212,0.15);
    }

    .md pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      overflow-x: auto;
      margin-bottom: 24px;
      position: relative;
    }

    .md pre code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      background: transparent;
      color: #e2e8f0;
      padding: 0;
      border: none;
      line-height: 1.6;
    }

    .md blockquote {
      border-left: 4px solid var(--accent);
      padding: 14px 20px;
      background: rgba(99,102,241,0.06);
      border-radius: 0 10px 10px 0;
      margin-bottom: 20px;
      font-style: italic;
      color: var(--text-dim);
    }

    .md table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .md th {
      background: rgba(255,255,255,0.03);
      padding: 10px 16px;
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      text-align: left;
    }

    .md td {
      padding: 10px 16px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .md a { color: #818cf8; text-decoration: none; }
    .md a:hover { text-decoration: underline; }

    .md strong { color: var(--text); font-weight: 600; }
    .md em { color: var(--text-dim); }

    .md hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* ─── Mermaid Diagram Block ─── */
    .mermaid-block {
      margin: 28px 0;
      background: rgba(8, 12, 24, 0.85);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .mermaid-label {
      padding: 8px 18px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      background: rgba(99,102,241,0.06);
      border-bottom: 1px solid rgba(99,102,241,0.15);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mermaid-wrap {
      padding: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 120px;
    }

    .mermaid-wrap svg {
      max-width: 100%;
      height: auto;
      /* make mermaid SVG text and lines visible on dark bg */
      filter: invert(0);
    }

    /* Force mermaid dark-friendly colours */
    .mermaid-wrap .label { color: var(--text) !important; }
    .mermaid-wrap .node rect,
    .mermaid-wrap .node circle,
    .mermaid-wrap .node polygon { fill: rgba(99,102,241,0.15) !important; stroke: rgba(99,102,241,0.5) !important; }
    .mermaid-wrap .edgePath .path { stroke: var(--text-muted) !important; }
    .mermaid-wrap text { fill: var(--text) !important; }

    .mermaid-error {
      padding: 16px 20px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ─── Objectives Panel ─── */
    .objectives-panel {
      margin-bottom: 30px;
      background: rgba(14,20,37,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .objectives-panel h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .obj-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .obj-check {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      animation: fadeInUp 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .toast.error {
      background: rgba(244,63,94,0.15);
      border: 1px solid rgba(244,63,94,0.35);
      color: #fca5a5;
    }

    .toast.success {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.35);
      color: #6ee7b7;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Overview tab ─── */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .overview-card {
      background: rgba(14,20,37,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .overview-card h4 {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12.5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Initialise Mermaid with dark theme ── */
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#07090f',
        primaryColor: '#6366f1',
        primaryTextColor: '#f1f5f9',
        primaryBorderColor: '#4f46e5',
        lineColor: '#64748b',
        secondaryColor: '#1e1b4b',
        tertiaryColor: '#0e1425',
        clusterBkg: '#0e1425',

        edgeLabelBackground: '#0e1425',
        nodeTextColor: '#f1f5f9',

    /* ── SVG Icons ── */
    const Icon = {

    /* ── Mermaid diagram block ── */
    function MermaidDiagram({ code }) {
      const ref = useRef(null);
      const [error, setError] = React.useState(null);

      useEffect(() => {
        if (!ref.current || !code.trim()) return;
        setError(null);
        
        try {
          let cleanCode = code.replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n').trim();
          
          // Match and escape node text labels in rect nodes id[text]
          cleanCode = cleanCode.replace(/([a-zA-Z0-9_-]+)\s*\[\s*([^"\r\n\]]+)\s*\]/g, (match, id, text) => {
            const escapedText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `${id}["${escapedText}"]`;
          });
          
          // Match and escape node text labels in rhombus nodes id{text}
          cleanCode = cleanCode.replace(/([a-zA-Z0-9_-]+)\s*\{\s*([^"\r\n\}]+)\s*\}/g, (match, id, text) => {
            const escapedText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `${id}\{"${escapedText}"\}`;
          });

          // Match and escape node text labels in round nodes id(text)
          cleanCode = cleanCode.replace(/([a-zA-Z0-9_-]+)\s*\(\s*([^"\r\n\)]+)\s*\)/g, (match, id, text) => {
            if (id === 'click' || id === 'style' || id === 'linkStyle' || id === 'classDef' || id === 'class') {
              return match;
            }
            const escapedText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `${id}("${escapedText}")`;
          });

          // Match and escape node text labels in stadium nodes id([text])
          cleanCode = cleanCode.replace(/([a-zA-Z0-9_-]+)\s*\(\[\s*([^"\r\n\]]+)\s*\]\)/g, (match, id, text) => {
            const escapedText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `${id}(\["${escapedText}"\])`;
          });

          ref.current.textContent = cleanCode;
          ref.current.removeAttribute('data-processed');
          mermaid.run({
            nodes: [ref.current]
          }).catch(err => {
            console.error("Mermaid rendering error:", err);
            setError(String(err));
          });
        } catch (err) {
          console.error("Mermaid render try-catch error:", err);
          setError(String(err));
        }
      }, [code]);

      return (
        <div className="mermaid-block">
          <div className="mermaid-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
            Diagram
          </div>
          <div className="mermaid-wrap">
            {error
              ? <div className="mermaid-error">⚠ Could not render diagram:<br/>{error}</div>
              : <div ref={ref} className="mermaid" />
            }
          </div>
        </div>
      );
    }

    /* ── Extract markdown from JSON if double-serialized ── */
    function extractMarkdown(content) {
      if (!content) return "";
      let raw = content.trim();
      if (raw.startsWith('{')) {
        try {
          const parsed = JSON.parse(raw);
          if (parsed.markdown) return parsed.markdown;
          if (parsed.content) return parsed.content;
        } catch (e) {
          // If standard JSON parsing fails, fallback to regex extraction of the markdown value
          const match = raw.match(/"markdown"\s*:\s*"([\s\S]*?)"\s*(?:,\s*"[a-zA-Z0-9_]+"|,\s*"needs_mermaid"|\})/);
          if (match) {
            try {
              return JSON.parse('"' + match[1] + '"');
            } catch (err) {
              return match[1]
                .replace(/\\r\\n/g, '\n')
                .replace(/\\n/g, '\n')
                .replace(/\\t/g, '\t')
                .replace(/\\"/g, '"')
                .replace(/\\\\/g, '\\');
            }
          }
        }
      }
      return raw;
    }

    /* ── Split markdown into text and mermaid segments ── */
    function parseSegments(raw) {
      const segments = [];
      
      // 1. Identify fenced code blocks starting with diagram keywords
      const fencedRe = /```(mermaid|flowchart|erDiagram|graph|sequenceDiagram|classDiagram|stateDiagram|gantt|pie|gitGraph|mindmap|timeline)\s*([\s\S]*?)```/g;
      
      let processed = raw;
      const placeholders = [];
      let match;
      
      while ((match = fencedRe.exec(processed)) !== null) {
        const placeholder = `__FENCED_MERMAID_PLACEHOLDER_${placeholders.length}__`;
        const code = match[2].trim();
        const diagramCode = match[1] === 'mermaid' ? code : `${match[1]}\n${code}`;
        placeholders.push({ placeholder, type: 'mermaid', content: diagramCode });
      }
      
      let placeholderIdx = 0;
      processed = processed.replace(fencedRe, () => {
        return placeholders[placeholderIdx++].placeholder;
      });

      // 2. Match un-fenced diagrams in the text (safe diagram keywords at the beginning of a line)
      const unfencedRe = /(?:^|\n)(flowchart\s+[a-zA-Z]{2}|graph\s+[a-zA-Z]{2}|erDiagram|sequenceDiagram|classDiagram|stateDiagram-v2|stateDiagram|gantt|gitGraph|mindmap|timeline)([\s\S]*?)(?=\n\n|\n#|\n---|$)/g;
      
      const unfencedPlaceholders = [];
      while ((match = unfencedRe.exec(processed)) !== null) {
        const placeholder = `__UNFENCED_MERMAID_PLACEHOLDER_${unfencedPlaceholders.length}__`;
        const diagramCode = (match[1] + match[2]).trim();
        unfencedPlaceholders.push({ placeholder, type: 'mermaid', content: diagramCode });
      }
      
      let unfencedIdx = 0;
      processed = processed.replace(unfencedRe, (fullMatch) => {
        const leadingNewline = fullMatch.startsWith('\n') ? '\n' : '';
        return leadingNewline + unfencedPlaceholders[unfencedIdx++].placeholder;
      });

      const allPlaceholders = [...placeholders, ...unfencedPlaceholders];

      if (allPlaceholders.length === 0) {
        segments.push({ type: 'md', content: processed });
        return segments;
      }

      const splitRe = new RegExp(`(${allPlaceholders.map(p => p.placeholder).join('|')})`, 'g');
      let last = 0;
      while ((match = splitRe.exec(processed)) !== null) {
        if (match.index > last) {
          segments.push({ type: 'md', content: processed.slice(last, match.index) });
        }
        const placeholderObj = allPlaceholders.find(p => p.placeholder === match[1]);
        if (placeholderObj) {
          segments.push({ type: 'mermaid', content: placeholderObj.content });
        }
        last = splitRe.lastIndex;
      }
      if (last < processed.length) {
        segments.push({ type: 'md', content: processed.slice(last) });
      }

      return segments;
    }

    /* ── Markdown renderer with Mermaid + highlight.js ── */
    function MarkdownView({ content }) {
      const mdRef = useRef(null);

      // highlight code blocks after every render
      useEffect(() => {
        if (mdRef.current) {
          mdRef.current.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));
        }
      });

      if (!content) return <p style={{ color: 'var(--text-muted)' }}>No content available.</p>;

      // Extract markdown from JSON wrapper if present
      let raw = extractMarkdown(content);
      
      // Normalize any literal escaped newlines to actual newlines
      raw = raw.replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n').trim();
      // ensure the first line is treated as a heading if there isn't one
      if (!raw.startsWith('#')) raw = '# ' + raw.split('\n')[0] + '\n\n' + raw;

      const segments = parseSegments(raw);

      return (
        <div ref={mdRef}>
          {segments.map((seg, i) => {
            if (seg.type === 'mermaid') {
              return <MermaidDiagram key={i} code={seg.content} />;
            }
            const html = marked.parse(seg.content || '');
            return (
              <div
                key={i}
                className="md"
                dangerouslySetInnerHTML={{ __html: html }}
              />
            );
          })}
        </div>
      );
    }

    /* ── Toast ── */
    function Toast({ message, type, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 4000);
        return () => clearTimeout(t);
      }, []);
      return <div className={`toast ${type}`}>{message}</div>;
    }

    /* ── Course Card ── */
    function CourseCard({ course, active, onClick }) {
      const date = course.created_at
        ? new Date(course.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '';
      return (
        <div className={`course-card ${active ? 'active' : ''}`} onClick={onClick}>
          <div className="card-sub">{course.primary_subcategory_title || 'General'}</div>
          <div className="card-title">{course.title}</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.4, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
            {course.headline}
          </div>
          <div className="card-meta">
            <span>⏱ {course.duration || '--'}</span>
            <span>{date}</span>
          </div>
        </div>
      );
    }

    /* ── Overview Panel ── */
    function CourseOverview({ course }) {
      const objectives = Array.isArray(course.objectives) ? course.objectives : [];
      const prerequisites = Array.isArray(course.prerequisites) ? course.prerequisites : [];

      return (
        <div>
          <div className="overview-grid">
            <div className="overview-card" style={{ gridColumn: '1 / -1' }}>
              <h4>About this Course</h4>
              <p style={{ color: 'var(--text-dim)', fontSize: 14, lineHeight: 1.75 }}>{course.description}</p>
            </div>
            <div className="overview-card">
              <h4>🎯 Learning Objectives</h4>
              {objectives.map((obj, i) => (
                <div key={i} className="obj-item">
                  <div className="obj-check" style={{ color: '#10b981' }}>{Icon.check}</div>
                  <span>{obj}</span>
                </div>
              ))}
            </div>
            <div className="overview-card">
              <h4>📋 Prerequisites</h4>
              {prerequisites.length > 0 ? (
                <div className="tag-list">
                  {prerequisites.map((p, i) => <span key={i} className="tag">{p}</span>)}
                </div>
              ) : (
                <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>No prerequisites required</p>
              )}
              <h4 style={{ marginTop: 20 }}>🎓 Target Audience</h4>
              <p style={{ color: 'var(--text-dim)', fontSize: 13, lineHeight: 1.6 }}>
                {course.target_audiences || '—'}
              </p>
              <h4 style={{ marginTop: 20 }}>🌐 Scraped References</h4>
              <div className="tag-list" style={{ marginTop: 4 }}>
                {(course.url_scraped || []).slice(0, 4).map((url, i) => (
                  <a key={i} className="tag" href={url} target="_blank" rel="noreferrer"
                     style={{ color: '#818cf8', fontSize: 11, wordBreak: 'break-all' }}>
                    {new URL(url).hostname}
                  </a>
                ))}
                {(course.url_scraped || []).length > 4 && (
                  <span className="tag">+{(course.url_scraped || []).length - 4} more</span>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Main App ── */
    function App() {
      const [courses, setCourses] = useState([]);
      const [activeCourse, setActiveCourse] = useState(null);
      const [activeLesson, setActiveLesson] = useState(null);
      const [activeChapterIdx, setActiveChapterIdx] = useState(null);
      const [activeLessonIdx, setActiveLessonIdx] = useState(null);
      const [prompt, setPrompt] = useState('');
      const [loading, setLoading] = useState(false);
      const [step, setStep] = useState(0); // 0=none, 1=meta, 2=template, 3=content
      const [toast, setToast] = useState(null);
      const [loadingCourse, setLoadingCourse] = useState(false);
      const [showOverview, setShowOverview] = useState(true);
      const contentRef = useRef(null);

      const API = 'http://127.0.0.1:8011';

      const showToast = (message, type = 'success') => setToast({ message, type });

      /* Load library */
      const fetchCourses = useCallback(async () => {
        try {
          const r = await fetch(`${API}/courses`);
          if (r.ok) setCourses(await r.json());
        } catch (e) { console.error(e); }
      }, []);

      useEffect(() => { fetchCourses(); }, []);

      /* Load specific course */
      const loadCourse = async (id) => {
        setLoadingCourse(true);
        setShowOverview(true);
        setActiveLesson(null);
        try {
          const r = await fetch(`${API}/courses/${id}`);
          if (r.ok) {
            const data = await r.json();
            // parse realcoursebody if string
            if (typeof data.realcoursebody === 'string') {
              try { data.realcoursebody = JSON.parse(data.realcoursebody); } catch {}
            }
            setActiveCourse(data);
          }
        } catch (e) { showToast('Failed to load course', 'error'); }
        setLoadingCourse(false);
      };

      /* Generate */
      const generate = async () => {
        if (!prompt.trim()) return;
        setLoading(true);
        setActiveCourse(null);
        setActiveLesson(null);
        setStep(1);

        const t1 = setTimeout(() => setStep(2), 6000);
        const t2 = setTimeout(() => setStep(3), 14000);

        try {
          const r = await fetch(`${API}/courses/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt }),
          });
          clearTimeout(t1); clearTimeout(t2);
          if (r.ok) {
            const data = await r.json();
            setPrompt('');
            await fetchCourses();
            if (data.id) await loadCourse(data.id);
            showToast('Course generated successfully! 🎉');
          } else {
            const err = await r.json().catch(() => ({}));
            showToast(err.detail || 'Generation failed', 'error');
          }
        } catch (e) {
          clearTimeout(t1); clearTimeout(t2);
          showToast('Connection error — is the server running?', 'error');
        }
        setLoading(false);
        setStep(0);
      };

      const onKey = (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate(); };

      /* Extract chapters/sections */
      const getItems = () => {
        if (!activeCourse?.realcoursebody) return [];
        const body = activeCourse.realcoursebody;
        return body.chapters || body.sections || [];
      };

      const selectLesson = (lesson, ci, li) => {
        setShowOverview(false);
        setActiveLesson(lesson);
        setActiveChapterIdx(ci);
        setActiveLessonIdx(li);
        if (contentRef.current) contentRef.current.scrollTop = 0;
      };

      const items = getItems();

      /* ─── Render ─── */
      return (
        <div className="app">

          {/* ── Left Sidebar ── */}
          <aside className="sidebar">
            <div className="sidebar-top">
              <div className="logo-mark">{Icon.book}</div>
              <span className="logo-name">DeepAgent Studio</span>
            </div>

            {/* Generator */}
            <div className="gen-panel">
              <div className="gen-label">AI Course Generator</div>
              <textarea
                className="gen-textarea"
                value={prompt}
                onChange={e => setPrompt(e.target.value)}
                onKeyDown={onKey}
                placeholder="e.g. Advanced JavaScript course with ES6+, async patterns and React hooks..."
                disabled={loading}
              />
              <button className="gen-btn" onClick={generate} disabled={loading || !prompt.trim()}>
                {loading ? (
                  <>
                    <div className="loader-ring" style={{ width: 16, height: 16, marginBottom: 0, borderWidth: 2 }} />
                    Generating...
                  </>
                ) : (
                  <>{Icon.play} Generate Course</>
                )}
              </button>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6, textAlign: 'center' }}>
                Ctrl+Enter to submit
              </div>
            </div>

            {/* Library */}
            <div className="library">
              <div className="library-label">My Library ({courses.length})</div>
              {courses.length === 0 && (
                <p style={{ color: 'var(--text-muted)', fontSize: 13, textAlign: 'center', padding: '20px 0' }}>
                  No courses yet. Generate one!
                </p>
              )}
              {courses.map(c => (
                <CourseCard
                  key={c.id}
                  course={c}
                  active={activeCourse?.id === c.id}
                  onClick={() => loadCourse(c.id)}
                />
              ))}
            </div>
          </aside>

          {/* ── Main Workspace ── */}
          <main className="workspace">
            {/* Empty State */}
            {!loading && !activeCourse && !loadingCourse && (
              <div className="empty">
                <div className="empty-glow">
                  <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.2" strokeLinecap="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                  </svg>
                </div>
                <h2>Your Course Studio</h2>
                <p>
                  Enter a course idea in the sidebar to trigger the 3-agent pipeline — Metadata → Template → per-lesson Search &amp; Write — and explore the results beautifully here.
                </p>
              </div>
            )}

            {/* Loading State */}
            {loading && (
              <div className="loading">
                <div className="loader-ring" />
                <h2>Assembling Your Course</h2>
                <p>Our AI agents are researching the web and writing every lesson individually. Please wait a few minutes.</p>
                <div className="steps">
                  {[
                    { label: '🧠 Metadata Agent — structuring requirements', n: 1 },
                    { label: '📐 Template Agent — selecting curriculum layout', n: 2 },
                    { label: '✍️ Content Agent — lesson-by-lesson search & write', n: 3 },
                  ].map(({ label, n }) => {
                    const cls = step > n ? 'done' : step === n ? 'active' : '';
                    return (
                      <div key={n} className={`step ${cls}`}>
                        <div className="step-dot">
                          {step > n ? '✓' : n}
                        </div>
                        {label}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Loading existing course */}
            {loadingCourse && !loading && (
              <div className="loading">
                <div className="loader-ring" />
                <h2>Loading Course...</h2>
              </div>
            )}

            {/* Course Viewer */}
            {activeCourse && !loading && !loadingCourse && (
              <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
                {/* Banner */}
                <div className="banner">
                  <div className="banner-left">
                    <div className="badge">{activeCourse.primary_category_title || 'Course'}</div>
                    <div className="banner-title">{activeCourse.title}</div>
                    <div className="banner-headline">{activeCourse.headline}</div>
                  </div>
                  <div className="banner-right">
                    <div className="stat-chip">{Icon.clock} {activeCourse.duration || '--'}</div>
                    <div className="stat-chip">{Icon.globe} {activeCourse.language || 'English'}</div>
                    <div className="stat-chip">{Icon.users} {activeCourse.target_audiences?.slice(0, 30) || '--'}</div>
                  </div>
                </div>

                <div className="viewer">
                  {/* Lesson Nav */}
                  <nav className="lesson-nav">
                    {/* Overview button */}
                    <div className="chapter-group">
                      <button
                        className={`lesson-btn ${showOverview ? 'active' : ''}`}
                        onClick={() => { setShowOverview(true); setActiveLesson(null); }}
                        style={{ fontWeight: 600 }}
                      >
                        <span className="lesson-num">📋</span>
                        Course Overview
                      </button>
                    </div>

                    {items.map((item, ci) => (
                      <div key={ci} className="chapter-group">
                        <div className="chapter-name">Ch {ci + 1} · {item.title}</div>
                        {(item.lessons || []).map((lesson, li) => (
                          <button
                            key={li}
                            className={`lesson-btn ${activeChapterIdx === ci && activeLessonIdx === li && !showOverview ? 'active' : ''}`}
                            onClick={() => selectLesson(lesson, ci, li)}
                          >
                            <span className="lesson-num">{li + 1}</span>
                            {lesson.title}
                          </button>
                        ))}
                      </div>
                    ))}
                  </nav>

                  {/* Content Area */}
                  <div className="content-wrap">
                    <div className="content-scroll" ref={contentRef}>
                      <div style={{ maxWidth: 780, margin: '0 auto' }}>
                        {showOverview
                          ? <CourseOverview course={activeCourse} />
                          : activeLesson
                            ? <MarkdownView content={activeLesson.content_markdown} />
                            : null
                        }
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Toast */}
          {toast && (
            <Toast
              message={toast.message}
              type={toast.type}
              onClose={() => setToast(null)}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
